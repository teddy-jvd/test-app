<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bridge 測試 — 頁面 B</title>
  <style>
    :root {
      --brand: #f97316;
      --brand-dark: #c2410c;
      --brand-light: #fff7ed;
      --bg: #fafaf9;
      --card: #fff;
      --text: #1c1917;
      --muted: #78716c;
      --success: #10b981;
      --warning: #eab308;
      --danger: #ef4444;
      --border: #e7e5e4;
      --terminal: #1c1917;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 20px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: white;
      padding: 18px 16px 14px;
    }
    .header-row { display: flex; align-items: center; gap: 10px; }
    .page-badge {
      background: rgba(255,255,255,0.25);
      font-size: 11px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .header h1 { font-size: 16px; font-weight: 700; margin-top: 6px; }
    .header p { font-size: 11px; opacity: 0.75; margin-top: 2px; }

    /* Status */
    .status-bar {
      background: var(--brand-dark);
      color: white;
      font-size: 12px;
      padding: 7px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-left { display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; flex-shrink: 0; }
    .dot.ok { background: var(--success); animation: blink 2s infinite; }
    .dot.mock { background: var(--warning); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .counter { font-size: 11px; background: rgba(255,255,255,.2); padding: 2px 8px; border-radius: 20px; }

    /* Layout */
    .section { margin: 12px 16px 0; }
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); margin-bottom: 7px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Direction labels */
    .dir-label {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px;
      margin-bottom: 8px;
    }
    .dir-out { background: rgba(249,115,22,.12); color: var(--brand-dark); }
    .dir-in  { background: rgba(16,185,129,.12); color: #059669; }

    /* Action buttons */
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn {
      padding: 11px 8px; border-radius: 10px; border: none;
      font-size: 12px; font-weight: 700; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: opacity .15s;
    }
    .btn:active { opacity: .65; }
    .btn .bicon { font-size: 20px; }
    .btn .btype { font-size: 10px; font-family: monospace; opacity: .75; font-weight: 600; }
    .btn-primary { background: var(--brand); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-info    { background: #0ea5e9; color: white; }
    .btn-neutral { background: var(--border); color: var(--text); }
    .btn-danger  { background: var(--danger); color: white; }
    .btn-full    { grid-column: 1 / -1; flex-direction: row; justify-content: center; gap: 6px; }

    /* Received data */
    .data-card {
      background: var(--card);
      border-radius: 12px; border: 1px solid var(--border);
      overflow: hidden;
    }
    .data-row {
      display: flex; align-items: flex-start;
      padding: 9px 14px; border-bottom: 1px solid var(--border);
      font-size: 12px; gap: 10px;
    }
    .data-row:last-child { border-bottom: none; }
    .data-key { color: var(--muted); flex: 0 0 90px; font-size: 11px; padding-top: 1px; }
    .data-val { font-family: monospace; font-size: 12px; font-weight: 600; word-break: break-all; }
    .data-val.empty { color: var(--muted); font-weight: normal; font-style: italic; font-family: inherit; }
    .data-val.filled { color: var(--brand-dark); }

    /* Message log */
    .log {
      background: var(--terminal);
      border-radius: 12px; padding: 10px 12px;
      max-height: 200px; overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px; line-height: 1.75;
    }
    .log-line { display: flex; gap: 6px; }
    .log-t   { color: #57534e; flex-shrink: 0; }
    .log-out { color: #fdba74; }
    .log-in  { color: #6ee7b7; }
    .log-sys { color: #9ca3af; font-style: italic; }
    .log-err { color: #fca5a5; }
    .log-ok  { color: #86efac; }
    .log-msg { flex: 1; word-break: break-all; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <span class="page-badge">頁面 B</span>
  </div>
  <h1>Bridge 雙向通信測試</h1>
  <p>這是測試頁面 B · 用於驗證 WebView ↔ App 參數傳遞</p>
</div>

<div class="status-bar">
  <div class="status-left">
    <span class="dot" id="dot"></span>
    <span id="statusText">初始化中...</span>
  </div>
  <span class="counter" id="counter">↑0 ↓0</span>
</div>

<!-- Web → App -->
<div class="section">
  <div class="section-title">操作</div>
  <span class="dir-label dir-out">↑ Web → App</span>
  <div class="btn-grid">
    <button class="btn btn-primary" onclick="send('GET_TOKEN', null)">
      <span class="bicon">🔑</span><span>取得 Token</span>
      <span class="btype">GET_TOKEN</span>
    </button>
    <button class="btn btn-success" onclick="sendTrack()">
      <span class="bicon">📊</span><span>追蹤事件</span>
      <span class="btype">TRACK_EVENT</span>
    </button>
    <button class="btn btn-warning" onclick="send('OPEN_MODAL','https://example.com/privacy')">
      <span class="bicon">📱</span><span>開啟 Modal</span>
      <span class="btype">OPEN_MODAL</span>
    </button>
    <button class="btn btn-info" onclick="send('HAPTIC',{type:'success'})">
      <span class="bicon">📳</span><span>觸覺回饋</span>
      <span class="btype">HAPTIC</span>
    </button>
    <button class="btn btn-neutral" onclick="send('NAVIGATE',{url:'https://example.com/page-b'})">
      <span class="bicon">🧭</span><span>導向頁面</span>
      <span class="btype">NAVIGATE</span>
    </button>
    <button class="btn btn-neutral" onclick="send('CLOSE_MODAL',null)">
      <span class="bicon">✖️</span><span>關閉 Modal</span>
      <span class="btype">CLOSE_MODAL</span>
    </button>
  </div>
</div>

<!-- App → Web -->
<div class="section" style="margin-top:14px;">
  <div class="section-title">從 App 收到的資料</div>
  <span class="dir-label dir-in">↓ App → Web</span>
  <div class="data-card">
    <div class="data-row">
      <span class="data-key">Device ID</span>
      <span class="data-val empty" id="r-deviceId">—</span>
    </div>
    <div class="data-row">
      <span class="data-key">Platform</span>
      <span class="data-val empty" id="r-platform">—</span>
    </div>
    <div class="data-row">
      <span class="data-key">OS Version</span>
      <span class="data-val empty" id="r-osVersion">—</span>
    </div>
    <div class="data-row">
      <span class="data-key">App Version</span>
      <span class="data-val empty" id="r-appVersion">—</span>
    </div>
    <div class="data-row">
      <span class="data-key">FCM Token</span>
      <span class="data-val empty" id="r-fcmToken">—</span>
    </div>
    <div class="data-row">
      <span class="data-key">Launch Source</span>
      <span class="data-val empty" id="r-launchSource">—</span>
    </div>
    <div class="data-row">
      <span class="data-key">Push Title</span>
      <span class="data-val empty" id="r-pushTitle">—</span>
    </div>
    <div class="data-row">
      <span class="data-key">App State</span>
      <span class="data-val empty" id="r-appState">—</span>
    </div>
    <div class="data-row">
      <span class="data-key">Deep Link</span>
      <span class="data-val empty" id="r-deepLink">—</span>
    </div>
  </div>
</div>

<!-- 模擬觸發 -->
<div class="section" style="margin-top:14px;">
  <div class="section-title">模擬 App 發送（測試用）</div>
  <span class="dir-label dir-in">↓ 模擬 App → Web</span>
  <div class="btn-grid">
    <button class="btn btn-neutral" onclick="mockPush()">
      <span class="bicon">🔔</span><span>模擬推播</span>
      <span class="btype">PUSH_NOTIFICATION</span>
    </button>
    <button class="btn btn-neutral" onclick="mockStateBackground()">
      <span class="bicon">📲</span><span>App 切背景</span>
      <span class="btype">APP_STATE_CHANGE</span>
    </button>
    <button class="btn btn-neutral" onclick="mockStateActive()">
      <span class="bicon">☀️</span><span>App 回前景</span>
      <span class="btype">APP_STATE_CHANGE</span>
    </button>
    <button class="btn btn-neutral" onclick="mockDeepLink()">
      <span class="bicon">🔗</span><span>模擬 Deep Link</span>
      <span class="btype">DEEP_LINK</span>
    </button>
    <button class="btn btn-danger btn-full" onclick="clearLog()">
      <span class="bicon">🗑</span><span>清除紀錄</span>
    </button>
  </div>
</div>

<!-- 訊息紀錄 -->
<div class="section" style="margin-top:14px;">
  <div class="section-title">訊息紀錄</div>
  <div class="log" id="log">
    <div class="log-line"><span class="log-msg log-sys">等待操作...</span></div>
  </div>
</div>

<script>
  var sentCount = 0, recvCount = 0;

  function ts() {
    return new Date().toLocaleTimeString('zh-TW', { hour12: false });
  }

  function appendLog(dir, content) {
    var el = document.getElementById('log');
    var line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML =
      '<span class="log-t">[' + ts() + ']</span>' +
      '<span class="' + dir + '">' + escHtml(content) + '</span>';
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateCounter() {
    document.getElementById('counter').textContent = '↑' + sentCount + ' ↓' + recvCount;
  }

  function setField(id, val) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = val || '—';
    el.className = val ? 'data-val filled' : 'data-val empty';
  }

  // 發送 Web → App
  function send(type, payload) {
    window.ReactNativeBridge.postMessage(type, payload);
    sentCount++;
    updateCounter();
    appendLog('log-out', '↑ ' + type + ' ' + JSON.stringify(payload));
  }

  function sendTrack() {
    send('TRACK_EVENT', {
      eventName: 'page_b_test_tap',
      properties: { page: 'bridge_test_b', ts: Date.now() }
    });
  }

  // 模擬 App 派送
  function mockDispatch(type, payload) {
    window.ReactNativeBridge._dispatch({ type: type, payload: payload });
  }

  function mockPush() {
    mockDispatch('PUSH_NOTIFICATION', {
      title: '測試推播 B',
      body: '來自頁面B的模擬推播',
      data: { screen: 'product', id: '456' }
    });
  }

  function mockStateBackground() {
    mockDispatch('APP_STATE_CHANGE', { state: 'background', timestamp: Date.now() });
  }

  function mockStateActive() {
    mockDispatch('APP_STATE_CHANGE', { state: 'active', timestamp: Date.now() });
  }

  function mockDeepLink() {
    mockDispatch('DEEP_LINK', { url: 'myapp://page-b/sale?code=SUMMER', params: { code: 'SUMMER' } });
  }

  function clearLog() {
    document.getElementById('log').innerHTML =
      '<div class="log-line"><span class="log-msg log-sys">紀錄已清除</span></div>';
    sentCount = 0; recvCount = 0; updateCounter();
  }

  // 監聽 App → Web
  function setupListeners() {
    window.ReactNativeBridge.on('TOKEN_RESPONSE', function(p) {
      recvCount++; updateCounter();
      var d = p && p.deviceInfo || {};
      setField('r-deviceId', d.deviceId);
      setField('r-platform', d.platform);
      setField('r-osVersion', d.osVersion);
      setField('r-appVersion', d.appVersion);
      if (p && p.fcmToken) setField('r-fcmToken', String(p.fcmToken).substring(0,24)+'…');
      if (p && p.launchSource) setField('r-launchSource', p.launchSource);
      appendLog('log-in', '↓ TOKEN_RESPONSE deviceId=' + d.deviceId + ' platform=' + d.platform);
    });

    window.ReactNativeBridge.on('PUSH_NOTIFICATION', function(p) {
      recvCount++; updateCounter();
      setField('r-pushTitle', p && (p.title || '（無標題）'));
      appendLog('log-in', '↓ PUSH_NOTIFICATION title=' + (p && p.title));
    });

    window.ReactNativeBridge.on('APP_STATE_CHANGE', function(p) {
      recvCount++; updateCounter();
      setField('r-appState', p && p.state);
      appendLog('log-in', '↓ APP_STATE_CHANGE state=' + (p && p.state));
    });

    window.ReactNativeBridge.on('DEEP_LINK', function(p) {
      recvCount++; updateCounter();
      setField('r-deepLink', p && p.url);
      appendLog('log-in', '↓ DEEP_LINK url=' + (p && p.url));
    });
  }

  // Bridge 初始化
  function initBridge() {
    if (!window.ReactNativeBridge) {
      document.getElementById('dot').className = 'dot mock';
      document.getElementById('statusText').textContent = '模擬模式（非 WebView 環境）';
      appendLog('log-err', '非 WebView 環境，啟用模擬 Bridge');

      window.ReactNativeBridge = {
        _handlers: {},
        postMessage: function(type, payload) {
          appendLog('log-sys', '[模擬] App 收到 ' + type);
          if (type === 'GET_TOKEN') {
            setTimeout(function() {
              window.ReactNativeBridge._dispatch({
                type: 'TOKEN_RESPONSE',
                payload: {
                  deviceInfo: {
                    deviceId: 'MOCK-B-' + Math.random().toString(36).substr(2,8).toUpperCase(),
                    platform: 'Android',
                    osVersion: '14.0',
                    appVersion: '1.0.0'
                  },
                  fcmToken: 'mock_fcm_bbbb_' + Math.random().toString(36).substr(2,12),
                  launchSource: 'normal'
                }
              });
            }, 400);
          }
        },
        on: function(t, h) { this._handlers[t] = h; },
        _dispatch: function(msg) {
          if (this._handlers[msg.type]) this._handlers[msg.type](msg.payload);
        }
      };
      return;
    }

    document.getElementById('dot').className = 'dot ok';
    document.getElementById('statusText').textContent = 'Bridge 已連接';
    appendLog('log-ok', 'Bridge 初始化成功');
  }

  window.addEventListener('load', function() {
    initBridge();
    setupListeners();
    // 頁面載入後自動取得 Token
    setTimeout(function() {
      send('GET_TOKEN', null);
    }, 600);
  });
</script>
</body>
</html>
